services:
  alma-executor:
    build:
      context: ../..
      dockerfile: crates/alma-executor/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - QDRANT_URL=http://qdrant:6334
      - ALMA_DEFAULT_MODEL=${ALMA_DEFAULT_MODEL:-anthropic/claude-sonnet-4}
      - ALMA_PREAMBLE=${ALMA_PREAMBLE:-You are a helpful AI assistant powered by Alma Labs.}
      - RUST_LOG=${RUST_LOG:-info}
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  qdrant_data:
